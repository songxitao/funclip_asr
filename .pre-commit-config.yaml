repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.4.4
    hooks:
      - id: ruff
        args: [--fix]
  - repo: local
    hooks:
      - id: pytest-unit
        name: pytest unit tests
        entry: E:/conda/envs/asr_ui_env/python.exe -m pytest
        args: [tests/unit/, -x, -q]
        language: system
        pass_filenames: false
        always_run: true

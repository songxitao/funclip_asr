# Dify 自定义工具 OpenAPI Schema —— funclip-pro ASR & 说话人分离微服务
#
# 用途：在 Dify 的「工具 → 自定义工具」中直接导入本文件，即可获得一个
#       `POST /transcribe` 的 ASR + 说话人分离工具节点。
#
# 导入方式：
#   1. Dify 控制台 → 工具 → 自定义工具 → 创建 → 选「OpenAPI Schema」
#   2. 把本文件内容整段粘贴进去（或上传本文件）
#   3. 保存后，在工作流/编排中即可调用。
#   4. Dify 容器访问本地服务的 URL 默认为：http://host.docker.internal:8002
#
openapi: 3.0.0
info:
  title: funclip-pro ASR & 说话人分离服务
  description: >-
    基于 SenseVoiceSmall 的语音转转写微服务，集成了 pyannote/segmentation-3.0 与 Cam++ 说话人角色对齐。
    支持自动路由引擎与三种 VAD 策略，支持分人角色文本生成。
  version: "1.1.0"
servers:
  - url: http://host.docker.internal:8002
    description: 本地 ASR 与说话人服务（Dify 容器访问专用）
paths:
  /transcribe:
    post:
      operationId: transcribe
      summary: 语音识别与说话人分离对齐
      description: >-
        接收音频文件，返回识别出的带标点的文本或进行说话人角色对齐的转写段落。
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
                  description: 音频文件（wav/mp3/flac等二进制文件），必填
                engine:
                  type: string
                  enum:
                    - gpu
                    - cpu
                  description: 可选。强制后端：gpu=PyTorch-GPU，cpu=Sherpa-CPU。留空则按 CUDA 可用性自动路由。
                vad_strategy:
                  type: string
                  enum:
                    - auto
                    - always
                    - never
                  default: auto
                  description: >-
                    可选。VAD 策略：auto=短音频廉价trim直解、长音频完整FSMN VAD；
                    always=永远FSMN VAD；never=不做VAD切分。
                diarize:
                  type: string
                  enum:
                    - "true"
                    - "false"
                  default: "false"
                  description: 可选。是否开启说话人角色分离。
                diarize_strategy:
                  type: string
                  enum:
                    - single
                    - two_stage
                    - spectral
                    - vad_sliding
                    - seg_clustering
                  default: seg_clustering
                  description: >-
                    可选。说话人聚类分离策略：seg_clustering(推荐, 错误率最低)，
                    vad_sliding(滑窗提纯)，spectral(谱聚类)，two_stage(宁拆不混两阶段)。
                num_speakers:
                  type: integer
                  description: 可选。指定该音频中真实的说话人人数（传入该值可让全局聚类极其稳定）。
                response_format:
                  type: string
                  enum:
                    - json
                    - text
                  default: text
                  description: 可选。返回格式：json=完整结构化JSON（含segments分段），text=只返回识别出的干净纯文本或分人段文本。默认为 text。
              required:
                - file
      responses:
        "200":
          description: 处理成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  text:
                    type: string
                    description: 识别出的带标点的文本（开启 diarize 时为未分人前全文）
                  diarized_text:
                    type: string
                    description: 开启 diarize 且 response_format=json 时返回的格式化说话人分段文本
                  latency_ms:
                    type: number
                    description: 端到端耗时（毫秒）
                  engine:
                    type: string
                    description: 实际使用的引擎（sherpa / torch）
                  segments:
                    type: array
                    items:
                      type: object
                      properties:
                        start:
                          type: integer
                          description: 段起点（毫秒）
                        end:
                          type: integer
                          description: 段终点（毫秒）
                        speaker:
                          type: string
                          description: 说话人 ID（从 1 开始）
                        text:
                          type: string
                          description: 该段转写的具体文本
        "413":
          description: 上传文件超过 50MB 限制
        "500":
          description: 服务端内部失败
        "503":
          description: 模型尚未初始化完毕

name: CI

on: [push, pull_request]

env:
  PYTHONPATH: src

jobs:
  test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.lock
      - name: Ruff check
        run: ruff check src/
      - name: Mock pipeline tests (no system deps needed)
        run: pytest tests/integration/test_pipeline_mock.py -v --tb=short
      - name: Data model unit tests (no system deps needed)
        run: pytest tests/unit/test_models.py -v --tb=short

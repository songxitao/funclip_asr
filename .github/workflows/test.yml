name: CI

on: [push, pull_request]

env:
  PYTHONPATH: src

jobs:
  test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.lock
      - name: Ruff check
        run: ruff check src/
      - name: Unit tests (no system deps needed)
        run: pytest tests/unit/ -x -q -m 'not slow' --tb=short
      - name: Integration tests (no system deps needed)
        run: pytest tests/integration/ -x -q -m 'not slow' --tb=short
